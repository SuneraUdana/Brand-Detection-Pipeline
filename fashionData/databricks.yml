# This is a Databricks asset bundle definition for fashionData.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: fashionData
  uuid: 836fbf76-f3b9-467e-b2c3-379a1206087b

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-49fc2eb9-084c.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-49fc2eb9-084c.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/s.wanninayaka-mudiyanselage@rgu.ac.uk to make sure we only have a single copy.
      root_path: /Workspace/Users/s.wanninayaka-mudiyanselage@rgu.ac.uk/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: s.wanninayaka-mudiyanselage@rgu.ac.uk
        level: CAN_MANAGE
